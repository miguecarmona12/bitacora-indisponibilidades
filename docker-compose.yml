services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitacora
    ports:
      - "5432:5432"
    volumes:
      - /opt/bitacora/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitacora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitacora_network

  backend:
    build: ./backend
    container_name: fastapi_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bitacora
    volumes:
      - ./backend:/app
    networks:
      - bitacora_network
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000"
  

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: react_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    networks:
      - bitacora_network

networks:
  bitacora_network:
    driver: bridge